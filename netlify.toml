[build]
  publish = "."
  functions = "netlify/functions"

# ── Sécurité globale — toutes les pages ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS pendant 2 ans, inclut les sous-domaines, prêt pour preload
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Bloque l'intégration de ton site dans une iframe (clickjacking)
    X-Frame-Options = "DENY"

    # Empêche le navigateur de deviner le type MIME
    X-Content-Type-Options = "nosniff"

    # N'envoie que l'origine dans le Referer, jamais le chemin complet
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Désactive caméra, micro et géolocalisation ; paiement limité à la même origine
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"

    # Content Security Policy :
    #   script-src  → seulement code inline (nos <script>) + Stripe JS
    #   style-src   → styles inline (nos <style>) + Google Fonts CSS
    #   font-src    → polices locales (Mayonice) + Google Fonts (gstatic)
    #   img-src     → assets locaux + data: (grain SVG) + blob:
    #   connect-src → même origine (function Netlify + form) + API Stripe
    #   frame-src   → iframe Stripe Card Element
    #   object-src  → rien (aucun Flash / plugin)
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
